    <!-- Real-time Error Diagnosis Overlay for iframe and sandboxed environments -->
    <script>
      (function() {
        var errorCount = 0;
        window.addEventListener('error', function(e) {
          errorCount++;
          var root = document.getElementById('root');
          if (root && errorCount <= 5) {
            var errContainer = document.getElementById('jafi-err-diagnostic');
            if (!errContainer) {
              errContainer = document.createElement('div');
              errContainer.id = 'jafi-err-diagnostic';
              errContainer.className = 'm-6 p-5 bg-red-50 border border-red-200 text-red-800 rounded-2xl shadow-lg max-w-4xl mx-auto text-left font-mono text-xs';
              errContainer.innerHTML = '<h3 class="text-base font-bold text-red-900 mb-2 font-sans">Sovereign Portal: Client-Side Telemetry Intercept</h3>' +
                '<p class="mb-3 font-sans text-neutral-600">A security block or runtime reference interrupt occurred in the browser pipeline. Please double check CDN state or script definitions below:</p>';
              root.insertBefore(errContainer, root.firstChild);
            }
            var errLine = document.createElement('div');
            errLine.className = 'p-3 bg-white border border-red-100 rounded-xl mb-2 leading-relaxed';
            errLine.innerHTML = '<strong>Error:</strong> ' + (e.message || 'Unknown compilation or execution error') +
              '<br/><span class="text-[10px] text-neutral-400">Location: ' + (e.filename || 'Babel standalone script block') + ' : Line ' + (e.lineno || 'N/A') + ':' + (e.colno || 'N/A') + '</span>';
            errContainer.appendChild(errLine);
          }
        });
        window.addEventListener('unhandledrejection', function(e) {
          var root = document.getElementById('root');
          if (root) {
            var errContainer = document.getElementById('jafi-err-diagnostic');
            if (!errContainer) {
              errContainer = document.createElement('div');
              errContainer.id = 'jafi-err-diagnostic';
              errContainer.className = 'm-6 p-5 bg-red-50 border border-red-200 text-red-800 rounded-2xl shadow-lg max-w-4xl mx-auto text-left font-mono text-xs';
              errContainer.innerHTML = '<h3 class="text-base font-bold text-red-900 mb-2 font-sans">Sovereign Portal: Client-Side Telemetry Intercept</h3>' +
                '<p class="mb-3 font-sans text-neutral-600">An unhandled promise rejection occurred in the background thread:</p>';
              root.insertBefore(errContainer, root.firstChild);
            }
            var errLine = document.createElement('div');
            errLine.className = 'p-3 bg-white border border-red-100 rounded-xl mb-2 leading-relaxed';
            errLine.innerHTML = '<strong>Rejection:</strong> ' + (e.reason || 'Unknown Rejection');
            errContainer.appendChild(errLine);
          }
        });
      })();
    </script>
